name: Deploy Application to EC2

on:
  push:
    branches: [main]
    paths:
      - 'nodejs-app/**'
      - 'monitoring/**'
      - '.github/workflows/deploy-app.yml'
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - monitoring-server
          - app-servers
      deploy_monitoring:
        description: 'Deploy Grafana/Loki stack'
        required: true
        default: true
        type: boolean
      deploy_app:
        description: 'Deploy Node.js application'
        required: true
        default: true
        type: boolean

env:
  AWS_REGION: us-east-1
  PROJECT_TAG: grafana-loki-monitoring
  DOCKER_IMAGE: nodejs-loki-app
  NODE_VERSION: '18'

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Test & Lint
  # ─────────────────────────────────────────────
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: nodejs-app
        run: npm ci || npm install

      - name: Run tests
        working-directory: nodejs-app
        run: npm test

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: nodejs-app/Dockerfile
          failure-threshold: warning
        continue-on-error: true

  # ─────────────────────────────────────────────
  # Job 2: Build Docker Image
  # ─────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image metadata
        id: meta
        run: |
          TAG="${{ github.sha }}"
          echo "tag=${TAG:0:8}" >> $GITHUB_OUTPUT

      - name: Build image
        working-directory: nodejs-app
        run: |
          docker build \
            --tag ${{ env.DOCKER_IMAGE }}:${{ steps.meta.outputs.tag }} \
            --tag ${{ env.DOCKER_IMAGE }}:latest \
            --label "git.sha=${{ github.sha }}" \
            --label "git.branch=${{ github.ref_name }}" \
            .

      - name: Test image
        run: |
          docker run -d --name test-app \
            -e LOKI_HOST="" \
            -e PORT=3000 \
            -e INSTANCE_ID=ci-test \
            -p 3000:3000 \
            ${{ env.DOCKER_IMAGE }}:latest
          
          sleep 5
          
          # Health check
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/health)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Health check failed with HTTP $HTTP_CODE"
            docker logs test-app
            exit 1
          fi
          echo "Health check passed (HTTP $HTTP_CODE)"
          
          # Metrics check
          curl -s http://localhost:3000/metrics | grep -q "process_cpu" || (echo "Metrics endpoint broken" && exit 1)
          echo "Metrics endpoint working"
          
          docker stop test-app

      - name: Save image
        run: |
          docker save ${{ env.DOCKER_IMAGE }}:latest | gzip > /tmp/app-image.tar.gz
          ls -lh /tmp/app-image.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ steps.meta.outputs.tag }}
          path: /tmp/app-image.tar.gz
          retention-days: 3

  # ─────────────────────────────────────────────
  # Job 3: Deploy to EC2 Instances
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    environment: production
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-${{ needs.build.outputs.image_tag }}
          path: /tmp/

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "StrictHostKeyChecking no" >> ~/.ssh/ssh_config

      - name: Get target instance IPs
        id: targets
        run: |
          TARGET="${{ github.event.inputs.target || 'all' }}"
          
          case "$TARGET" in
            "all")
              FILTER="Name=tag:Project,Values=${{ env.PROJECT_TAG }}"
              ;;
            "monitoring-server")
              FILTER="Name=tag:Project,Values=${{ env.PROJECT_TAG }} Name=tag:Role,Values=monitoring-server"
              ;;
            "app-servers")
              FILTER="Name=tag:Project,Values=${{ env.PROJECT_TAG }} Name=tag:Role,Values=app-server"
              ;;
          esac
          
          IPS=$(aws ec2 describe-instances \
            --region ${{ env.AWS_REGION }} \
            --filters $FILTER "Name=instance-state-name,Values=running" \
            --query 'Reservations[].Instances[].PublicIpAddress' \
            --output text)
          
          echo "ips=$IPS" >> $GITHUB_OUTPUT
          echo "Target IPs: $IPS"
          
          if [ -z "$IPS" ]; then
            echo "::error::No running instances found for target: $TARGET"
            exit 1
          fi

      - name: Deploy to instances
        run: |
          DEPLOY_MONITORING="${{ github.event.inputs.deploy_monitoring || 'true' }}"
          DEPLOY_APP="${{ github.event.inputs.deploy_app || 'true' }}"
          
          for IP in ${{ steps.targets.outputs.ips }}; do
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  Deploying to: $IP"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            
            # Copy Docker image
            echo "  📦 Uploading Docker image..."
            scp -i ~/.ssh/deploy_key /tmp/app-image.tar.gz ubuntu@$IP:/tmp/
            
            # Copy monitoring configs
            if [ "$DEPLOY_MONITORING" == "true" ]; then
              echo "  📁 Uploading monitoring configs..."
              scp -i ~/.ssh/deploy_key -r monitoring/ ubuntu@$IP:/opt/monitoring-app/
            fi
            
            # Deploy on remote
            ssh -i ~/.ssh/deploy_key ubuntu@$IP << 'REMOTE_DEPLOY'
              set -e
              cd /opt/monitoring-app
              
              # Load new Docker image
              echo "  🐳 Loading Docker image..."
              docker load < /tmp/app-image.tar.gz
              rm -f /tmp/app-image.tar.gz
              
              # Restart services
              echo "  🔄 Restarting services..."
              docker-compose pull --quiet 2>/dev/null || true
              docker-compose up -d --force-recreate --remove-orphans
              
              # Wait for health
              echo "  ⏳ Waiting for services..."
              sleep 10
              
              # Verify
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/health 2>/dev/null || echo "000")
              if [ "$HTTP_CODE" == "200" ]; then
                echo "  ✅ Deployment successful!"
              else
                echo "  ⚠️  App health check returned HTTP $HTTP_CODE"
              fi
          REMOTE_DEPLOY
            
            echo "  ✅ Done: $IP"
          done

      - name: Post-deploy health check
        run: |
          echo "## Deployment Health Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Instance | App (3000) | Grafana (3001) | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-----------|----------------|--------|" >> $GITHUB_STEP_SUMMARY
          
          sleep 5
          ALL_OK=true
          
          for IP in ${{ steps.targets.outputs.ips }}; do
            APP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "http://$IP:3000/health" 2>/dev/null || echo "000")
            GRAFANA=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "http://$IP:3001/api/health" 2>/dev/null || echo "000")
            
            if [ "$APP" == "200" ] && [ "$GRAFANA" == "200" ]; then
              STATUS="✅ Healthy"
            elif [ "$APP" == "200" ]; then
              STATUS="⚠️ App OK, Grafana down"
            else
              STATUS="❌ Unhealthy"
              ALL_OK=false
            fi
            
            echo "| $IP | $APP | $GRAFANA | $STATUS |" >> $GITHUB_STEP_SUMMARY
          done
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image tag:** ${{ needs.build.outputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "**Deploy time:** $(date -u)" >> $GITHUB_STEP_SUMMARY

      - name: Deployment summary
        run: |
          echo ""
          echo "════════════════════════════════════════"
          echo "  DEPLOYMENT COMPLETE"
          echo "  Image: ${{ env.DOCKER_IMAGE }}:${{ needs.build.outputs.image_tag }}"
          echo "  Targets: ${{ steps.targets.outputs.ips }}"
          echo "════════════════════════════════════════"
