name: "EC2 Start / Stop"

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Select Action"
        required: true
        type: choice
        options:
          - START
          - STOP
          - STATUS
  schedule:
    - cron: '0 7 * * 1-5'
    - cron: '0 20 * * 1-5'

env:
  AWS_REGION: us-east-1
  PROJECT_TAG: grafana-loki-monitoring

jobs:
  ec2-control:
    name: "${{ github.event.inputs.action || 'Scheduled' }}"
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - name: Determine action
        id: config
        run: |
          if [ "${{ github.event_name }}" == "schedule" ]; then
            HOUR=$(date -u +%H)
            if [ "$HOUR" -lt 12 ]; then
              echo "action=START" >> $GITHUB_OUTPUT
            else
              echo "action=STOP" >> $GITHUB_OUTPUT
            fi
          else
            echo "action=${{ github.event.inputs.action }}" >> $GITHUB_OUTPUT
          fi

      - name: Get instance
        id: instance
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --region ${{ env.AWS_REGION }} \
            --filters "Name=tag:Project,Values=${{ env.PROJECT_TAG }}" "Name=instance-state-name,Values=running,stopped" \
            --query 'Reservations[].Instances[].InstanceId' \
            --output text)
          
          STATE=$(aws ec2 describe-instances \
            --region ${{ env.AWS_REGION }} \
            --instance-ids $INSTANCE_ID \
            --query 'Reservations[].Instances[].State.Name' \
            --output text 2>/dev/null || echo "unknown")
          
          IP=$(aws ec2 describe-instances \
            --region ${{ env.AWS_REGION }} \
            --instance-ids $INSTANCE_ID \
            --query 'Reservations[].Instances[].PublicIpAddress' \
            --output text 2>/dev/null || echo "N/A")
          
          echo "id=$INSTANCE_ID" >> $GITHUB_OUTPUT
          echo "state=$STATE" >> $GITHUB_OUTPUT
          echo "ip=$IP" >> $GITHUB_OUTPUT

      - name: START
        if: steps.config.outputs.action == 'START'
        run: |
          if [ "${{ steps.instance.outputs.state }}" == "running" ]; then
            echo "Already running! Access: http://${{ steps.instance.outputs.ip }}:3001"
            exit 0
          fi
          aws ec2 start-instances --region ${{ env.AWS_REGION }} --instance-ids ${{ steps.instance.outputs.id }}
          aws ec2 wait instance-running --region ${{ env.AWS_REGION }} --instance-ids ${{ steps.instance.outputs.id }}
          IP=$(aws ec2 describe-instances --region ${{ env.AWS_REGION }} --instance-ids ${{ steps.instance.outputs.id }} --query 'Reservations[].Instances[].PublicIpAddress' --output text)
          echo "STARTED! Grafana: http://$IP:3001 | App: http://$IP:3000"

      - name: STOP
        if: steps.config.outputs.action == 'STOP'
        run: |
          if [ "${{ steps.instance.outputs.state }}" == "stopped" ]; then
            echo "Already stopped!"
            exit 0
          fi
          aws ec2 stop-instances --region ${{ env.AWS_REGION }} --instance-ids ${{ steps.instance.outputs.id }}
          aws ec2 wait instance-stopped --region ${{ env.AWS_REGION }} --instance-ids ${{ steps.instance.outputs.id }}
          echo "STOPPED! Compute charges paused."

      - name: STATUS
        if: steps.config.outputs.action == 'STATUS'
        run: |
          aws ec2 describe-instances \
            --region ${{ env.AWS_REGION }} \
            --filters "Name=tag:Project,Values=${{ env.PROJECT_TAG }}" \
            --query 'Reservations[].Instances[].[Tags[?Key==`Name`].Value|[0],InstanceId,State.Name,PublicIpAddress]' \
            --output table

      - name: Summary
        if: always()
        run: |
          echo "## EC2 ${{ steps.config.outputs.action }}" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Action | ${{ steps.config.outputs.action }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Instance | ${{ steps.instance.outputs.id }} |" >> $GITHUB_STEP_SUMMARY
          echo "| IP | ${{ steps.instance.outputs.ip }} |" >> $GITHUB_STEP_SUMMARY
